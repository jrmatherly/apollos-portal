services:
  db:
    image: postgres:18@sha256:69e8582b781cb44fa4557b98ed586fe68361e320d9b12f9707494335634f4f3d
    container_name: apollos-portal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or environment}
      POSTGRES_DB: apollos_portal
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - portal_db_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d apollos_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/jrmatherly/apollos-portal/backend:latest
    container_name: apollos-portal-migrate
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env or environment}
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app/backend
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  backend:
    image: ghcr.io/jrmatherly/apollos-portal/backend:latest
    container_name: apollos-portal-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env or environment}
    env_file:
      - ./backend/.env
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    image: ghcr.io/jrmatherly/apollos-portal/frontend:latest
    container_name: apollos-portal-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  docs:
    image: ghcr.io/jrmatherly/apollos-portal/docs:latest
    container_name: apollos-portal-docs
    restart: unless-stopped
    ports:
      - "3001:3000"

volumes:
  portal_db_data:
