[tasks.dev]
description = "Start all development services"
run = "docker compose up"

[tasks."dev:backend"]
description = "Start backend only (requires DB)"
dir = "backend"
run = "uv run uvicorn app.main:app --reload --port 8000"

[tasks."dev:frontend"]
description = "Start frontend only"
dir = "frontend"
run = "npm run dev"

[tasks."dev:docs"]
description = "Start docs preview server"
dir = "docs"
run = "mint dev"

[tasks.migrate]
description = "Run database migrations"
dir = "backend"
run = "uv run alembic upgrade head"

[tasks."migrate:generate"]
description = "Generate a new migration"
dir = "backend"
run = "uv run alembic revision --autogenerate -m \"$1\""

[tasks."lint:backend"]
description = "Lint backend Python code"
run = "uv run --package apollos-portal-backend ruff check backend/"

[tasks."lint:cli"]
description = "Lint CLI Python code"
run = "uv run --package apollos-cli ruff check cli/"

[tasks."lint:frontend"]
description = "Lint frontend TypeScript code"
dir = "frontend"
run = "npx biome check ."

[tasks.lint]
description = "Run all linters"
depends = ["lint:backend", "lint:cli", "lint:frontend"]

[tasks."format:backend"]
description = "Format backend Python code"
run = "uv run --package apollos-portal-backend ruff format backend/"

[tasks."format:cli"]
description = "Format CLI Python code"
run = "uv run --package apollos-cli ruff format cli/"

[tasks."format:frontend"]
description = "Format frontend TypeScript code"
dir = "frontend"
run = "npx biome format --write ."

[tasks.format]
description = "Format all code"
depends = ["format:backend", "format:cli", "format:frontend"]

[tasks."check:backend"]
description = "Check backend (lint + format, read-only)"
run = "uv run --package apollos-portal-backend ruff check backend/ && uv run --package apollos-portal-backend ruff format --check backend/"

[tasks."check:cli"]
description = "Check CLI (lint + format, read-only)"
run = "uv run --package apollos-cli ruff check cli/ && uv run --package apollos-cli ruff format --check cli/"

[tasks."check:frontend"]
description = "Check frontend (Biome CI + typecheck)"
dir = "frontend"
run = "npx biome ci . && npx tsc --noEmit"

[tasks."check:docs"]
description = "Check docs (validate + broken links)"
dir = "docs"
run = "mint validate && mint broken-links"

[tasks.check]
description = "Run all checks (read-only)"
depends = ["check:backend", "check:cli", "check:frontend", "check:docs"]

[tasks.test]
description = "Run backend tests"
dir = "backend"
run = "uv run pytest -v"

[tasks.qa]
description = "Full quality gate (checks + tests)"
depends = ["check", "test"]

[tasks."docker:up"]
description = "Start Docker services"
run = "docker compose up -d"

[tasks."docker:down"]
description = "Stop Docker services"
run = "docker compose down"

[tasks."docker:reset"]
description = "Reset Docker services and volumes"
run = "docker compose down -v && docker compose up -d"

[tasks."docker:docs"]
description = "Start docs container"
run = "docker compose up -d docs"

[tasks."db:shell"]
description = "Open psql shell"
run = "docker compose exec db psql -U portal -d apollos_portal"
