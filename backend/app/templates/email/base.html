<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Apollos AI Portal{% endblock %}</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      font-family: Arial, Helvetica, sans-serif;
    "
  >
    <span style="display: none; max-height: 0; overflow: hidden">
      {% block preheader %}{% endblock %}
    </span>
    <div style="max-width: 600px; margin: 0 auto; background: #ffffff">
      <div style="background: #1e3a5f; padding: 24px 32px">
        <h1 style="color: #ffffff; margin: 0; font-size: 22px">
          Apollos AI Portal
        </h1>
      </div>
      <div style="padding: 32px">{% block content %}{% endblock %}</div>
      <div style="background: #f4f4f4; padding: 16px 32px; text-align: center">
        <p style="color: #888; font-size: 12px; margin: 0">
          Apollos AI &mdash; Internal Developer Portal<br />
          This is an automated notification. Do not reply to this email.
        </p>
      </div>
    </div>
  </body>
</html>
