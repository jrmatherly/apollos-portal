services:
  db:
    image: postgres:18@sha256:69e8582b781cb44fa4557b98ed586fe68361e320d9b12f9707494335634f4f3d
    container_name: apollos-portal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: apollos_portal
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "5432:5432"
    volumes:
      - portal_db_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d apollos_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: apollos-portal-migrate
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://portal:portal@db:5432/apollos_portal}
    volumes:
      - ./backend:/app/backend
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app/backend
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: apollos-portal-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://portal:portal@db:5432/apollos_portal}
      UV_LINK_MODE: copy
      TEAMS_CONFIG_PATH: ${TEAMS_CONFIG_PATH:-backend/teams.yaml}
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app/backend
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./uv.lock:/app/uv.lock:ro
      - /app/.venv
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: uv run --frozen uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --app-dir backend
    develop:
      watch:
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: uv.lock

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: deps
    container_name: apollos-portal-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev
    develop:
      watch:
        - action: rebuild
          path: frontend/package.json
        - action: rebuild
          path: frontend/package-lock.json

  docs:
    build:
      context: ./docs
      dockerfile: ../docker/docs.Dockerfile
    container_name: apollos-portal-docs
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./docs:/app
      - /app/node_modules
    develop:
      watch:
        - action: rebuild
          path: docs/package.json

volumes:
  portal_db_data:
