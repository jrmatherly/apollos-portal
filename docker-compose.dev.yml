services:
  db:
    image: postgres:18@sha256:69e8582b781cb44fa4557b98ed586fe68361e320d9b12f9707494335634f4f3d
    container_name: apollos-portal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: apollos_portal
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "5432:5432"
    volumes:
      - portal_db_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d apollos_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: apollos-portal-migrate
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://portal:portal@db:5432/apollos_portal}
    volumes:
      - ./backend:/app/backend
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app/backend
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: apollos-portal-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://portal:portal@db:5432/apollos_portal}
      UV_LINK_MODE: copy
      TEAMS_CONFIG_PATH: ${TEAMS_CONFIG_PATH:-backend/teams.yaml}
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app/backend
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./uv.lock:/app/uv.lock:ro
      - /app/.venv
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    command: uv run --frozen uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --app-dir backend
    develop:
      watch:
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: uv.lock

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: deps
    container_name: apollos-portal-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:3000/'', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on(''error'', () => process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    command: npm run dev
    develop:
      watch:
        - action: rebuild
          path: frontend/package.json
        - action: rebuild
          path: frontend/package-lock.json

  docs:
    build:
      context: ./docs
      dockerfile: ../docker/docs.Dockerfile
    container_name: apollos-portal-docs
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./docs:/app
      - /app/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:3000/'', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    develop:
      watch:
        - action: rebuild
          path: docs/package.json

  ##########################################################################
  #--------    OPTIONAL LITTELLM PROXY + MONITORING      --------          #
  ##########################################################################
  litellm:
    # build:
    #   context: .
    #   args:
    #     target: runtime
    image: docker.litellm.ai/berriai/litellm:main-stable@sha256:8280680339b2efefe1cd0728829ffd5b14c80358ded220307ed3011d662ed1bc
    #########################################
    ## Uncomment these lines to start proxy with a config.yaml file ##
    # volumes:
    #  - ./config.yaml:/app/config.yaml
    # command:
    #  - "--config=/app/config.yaml"
    ##############################################
    restart: unless-stopped
    ports:
      - "4000:4000" # Map the container port to the host, change the host port if necessary
    environment:
      DATABASE_URL: ${LITELLM_DATABASE_URL:-postgresql://llmproxy:dbpassword9090@litellm_db:5432/litellm}
      # DATABASE_URL: "postgresql://llmproxy:dbpassword9090@litellm_db:5432/litellm"
      STORE_MODEL_IN_DB: "True" # allows adding models to proxy via UI
    env_file:
      - ./backend/.env # Load local .env file
    depends_on:
      - litellm_db # Indicates that this service depends on the 'litellm_db' service, ensuring 'litellm_db' starts first
    healthcheck: # Defines the health check configuration for the container
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" # Command to execute for health check
      interval: 30s # Perform health check every 30 seconds
      timeout: 10s # Health check command times out after 10 seconds
      retries: 3 # Retry up to 3 times if health check fails
      start_period: 40s # Wait 40 seconds after container start before beginning health checks

  litellm_db:
    image: postgres:18@sha256:69e8582b781cb44fa4557b98ed586fe68361e320d9b12f9707494335634f4f3d
    container_name: litellm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: ${LITELLM_POSTGRES_PASSWORD:-dbpassword9090}
      POSTGRES_DB: litellm
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      PGDATA: /var/lib/postgresql/18/docker
    env_file:
      - ./backend/.env
    volumes:
      - litellm_postgres_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U llmproxy"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus@sha256:e4254400b85610324913f0dc4acf92603d9984e7519414c5a12811aa6146acc3
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    restart: always

volumes:
  portal_db_data:
  prometheus_data:
    driver: local
  litellm_postgres_data:
    name: litellm_postgres_data
