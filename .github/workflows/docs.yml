name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
  push:
    branches:
      - main
    paths:
      - "docs/**"

jobs:
  validate:
    name: Validate documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Mintlify CLI
        run: npm i -g mint

      - name: Validate build
        working-directory: docs
        run: mint validate

      - name: Check broken links
        working-directory: docs
        run: mint broken-links
